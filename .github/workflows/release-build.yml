name: Build Release Packages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - ".github/workflows/release-build.yml"
      - "release/**"
      - "requirements.txt"
      - "start.py"

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Linux package
        run: bash release/scripts/build_linux.sh

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: nit-code-linux
          path: release/downloads/linux/*

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build macOS package
        run: bash release/scripts/build_macos.sh

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: nit-code-macos
          path: release/downloads/macos/*

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Windows package
        shell: pwsh
        run: ./release/scripts/build_windows.ps1

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: nit-code-windows
          path: release/downloads/windows/*

  publish-github-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: nit-code-linux
          path: release-assets

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: nit-code-macos
          path: release-assets

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: nit-code-windows
          path: release-assets

      - name: Create GitHub Release with assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/*
